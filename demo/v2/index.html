<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Shortform Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-darker: #050507;
    --bg: #0A0A0B;
    --surface-1: #111114;
    --surface-2: #18181C;
    --surface-3: #25252B;
    --border: #2A2A30;
    --border-bright: #3A3A42;
    --text: #F2F0EB;
    --text-dim: #8A8A92;
    --text-faint: #5A5A62;
    --accent-lime: #C8FF57;
    --accent-pink: #FF3D7F;
    --accent-blue: #57C8FF;
    --accent-orange: #FF8657;
    --accent-purple: #C857FF;
    --rising: #C8FF57;
    --peak: #FFD700;
    --fading: #6A6A72;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'Instrument Sans', sans-serif;
    background: #000;
    color: var(--text);
    height: 100%;
    width: 100%;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ======== STAGE — center the phone on desktop ======== */
  .stage {
    height: 100vh;
    width: 100vw;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 20% 10%, rgba(200, 255, 87, 0.04), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(255, 61, 127, 0.05), transparent 50%),
      var(--bg-darker);
    padding: 20px;
  }

  .phone {
    width: 100%;
    max-width: 420px;
    height: 100%;
    max-height: 880px;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 36px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 6px var(--surface-2),
      0 40px 80px rgba(0, 0, 0, 0.5),
      0 0 60px rgba(200, 255, 87, 0.04);
    display: flex;
    flex-direction: column;
  }

  @media (max-width: 480px) {
    .stage { padding: 0; }
    .phone {
      max-width: 100%;
      max-height: 100%;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
  }

  /* ======== Status bar ======== */
  .status-bar {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
  }

  .status-icons { display: flex; gap: 5px; align-items: center; opacity: 0.8; }

  /* ======== App header ======== */
  .app-header {
    flex-shrink: 0;
    padding: 8px 24px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .app-logo { display: flex; align-items: center; gap: 8px; }

  .app-logo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-lime);
    box-shadow: 0 0 10px var(--accent-lime);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  .app-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.04em;
  }

  .app-header-right {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    text-transform: uppercase;
    cursor: pointer;
  }

  .app-header-right:hover { color: var(--text); }

  /* ======== Screen container — handles transitions ======== */
  .screen-container {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .screen {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: var(--surface-3) transparent;
    opacity: 0;
    transform: translateX(20px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none;
  }

  .screen.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  .screen.exit-left {
    transform: translateX(-20px);
  }

  .screen::-webkit-scrollbar { width: 4px; }
  .screen::-webkit-scrollbar-track { background: transparent; }
  .screen::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }

  /* ======== Welcome screen — Editorial Magazine Style ======== */
  .welcome {
    height: 100%;
    position: relative;
    overflow: hidden;
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  /* Animated gradient mesh background */
  .welcome-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .welcome-bg::before,
  .welcome-bg::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.6;
  }

  .welcome-bg::before {
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, var(--accent-lime), transparent 70%);
    top: -80px;
    right: -80px;
    animation: float-1 8s ease-in-out infinite;
  }

  .welcome-bg::after {
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, var(--accent-pink), transparent 70%);
    bottom: 100px;
    left: -100px;
    animation: float-2 10s ease-in-out infinite;
  }

  @keyframes float-1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-30px, 40px) scale(1.1); }
  }

  @keyframes float-2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(40px, -30px) scale(0.9); }
  }

  /* Noise texture overlay */
  .welcome-noise {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
  }

  .welcome-content {
    position: relative;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 28px 32px;
    z-index: 2;
  }

  /* Top section — branding */
  .welcome-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: auto;
  }

  .welcome-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .welcome-brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-lime);
    box-shadow: 0 0 12px var(--accent-lime);
    animation: pulse 2s ease-in-out infinite;
  }

  .welcome-brand-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .welcome-version {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  /* Main headline section */
  .welcome-main {
    margin: auto 0;
  }

  .welcome-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--accent-lime);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .welcome-eyebrow::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--accent-lime), transparent);
    max-width: 100px;
  }

  .welcome-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 76px;
    line-height: 0.88;
    letter-spacing: 0;
    margin-bottom: 28px;
    color: var(--text);
  }

  .welcome-title .line-1 {
    display: block;
    color: var(--text);
  }

  .welcome-title .line-2 {
    display: block;
    color: var(--accent-lime);
    text-shadow: 0 0 40px rgba(200, 255, 87, 0.3);
  }

  .welcome-title .line-3 {
    display: block;
    font-style: italic;
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 400;
    font-size: 22px;
    line-height: 1.3;
    letter-spacing: 0;
    margin-top: 16px;
    color: var(--text-dim);
    max-width: 280px;
  }

  /* Stats inline strip */
  .welcome-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    margin: 32px 0;
    padding: 16px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .welcome-stat {
    text-align: left;
    position: relative;
  }

  .welcome-stat:not(:last-child)::after {
    content: '';
    position: absolute;
    right: 0;
    top: 10%;
    bottom: 10%;
    width: 1px;
    background: var(--border);
  }

  .welcome-stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    line-height: 1;
    color: var(--text);
    margin-bottom: 4px;
  }

  .welcome-stat-num.accent {
    color: var(--accent-lime);
  }

  .welcome-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  /* Bottom CTA section */
  .welcome-cta-section {
    margin-top: auto;
  }

  .welcome-cta {
    width: 100%;
    padding: 18px 24px;
    background: var(--accent-lime);
    color: var(--bg);
    border: none;
    border-radius: 16px;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .welcome-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }

  .welcome-cta:hover::before {
    transform: translateX(100%);
  }

  .welcome-cta:hover {
    box-shadow: 0 8px 30px rgba(200, 255, 87, 0.4);
    transform: translateY(-2px);
  }

  .welcome-cta-arrow {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--bg);
    color: var(--accent-lime);
    display: grid;
    place-items: center;
    font-size: 16px;
    transition: transform 0.2s;
  }

  .welcome-cta:hover .welcome-cta-arrow {
    transform: translateX(4px);
  }

  .welcome-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  .welcome-meta-time {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .welcome-meta-time::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-pink);
    animation: pulse 2s ease-in-out infinite;
  }

  /* Staggered entrance */
  .welcome-eyebrow,
  .welcome-title,
  .welcome-stats,
  .welcome-cta-section {
    opacity: 0;
    transform: translateY(20px);
    animation: rise-in 0.8s forwards;
  }

  .welcome-eyebrow { animation-delay: 0.1s; }
  .welcome-title { animation-delay: 0.2s; }
  .welcome-stats { animation-delay: 0.4s; }
  .welcome-cta-section { animation-delay: 0.5s; }

  @keyframes rise-in {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ======== Survey screen ======== */
  .survey-content {
    padding: 0 24px 100px;
    min-height: 100%;
    display: flex;
    flex-direction: column;
  }

  .survey-progress {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
  }

  .progress-segment {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--surface-2);
    transition: background 0.3s;
  }

  .progress-segment.done { background: var(--accent-lime); }
  .progress-segment.current { background: var(--accent-lime); opacity: 0.6; }

  .survey-step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent-lime);
    margin-bottom: 12px;
  }

  .survey-question {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1.1;
    letter-spacing: 0.01em;
    margin-bottom: 8px;
  }

  .survey-hint {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 28px;
  }

  .option-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .option:hover { border-color: var(--border-bright); transform: translateX(2px); }

  .option.selected {
    background: rgba(200, 255, 87, 0.08);
    border-color: var(--accent-lime);
  }

  .option-emoji {
    font-size: 22px;
    width: 36px;
    height: 36px;
    display: grid;
    place-items: center;
    background: var(--surface-2);
    border-radius: 10px;
    flex-shrink: 0;
  }

  .option.selected .option-emoji {
    background: rgba(200, 255, 87, 0.15);
  }

  .option-label {
    font-size: 15px;
    font-weight: 500;
    flex: 1;
  }

  .option-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border-bright);
    display: grid;
    place-items: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option.selected .option-check {
    background: var(--accent-lime);
    border-color: var(--accent-lime);
  }

  .option.selected .option-check::after {
    content: '';
    width: 6px;
    height: 10px;
    border-right: 2px solid var(--bg);
    border-bottom: 2px solid var(--bg);
    transform: rotate(45deg);
    margin-top: -2px;
  }

  /* Multi-select for Q5 */
  .option.multi.selected .option-check { border-radius: 4px; }
  .option.multi.selected .option-check::after {
    width: 5px;
    height: 9px;
  }

  /* Slider */
  .slider-wrap {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 20px;
    margin-bottom: 28px;
  }

  .slider-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    color: var(--accent-lime);
    margin-bottom: 4px;
  }

  .slider-value-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .slider-input {
    width: 100%;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    margin-bottom: 12px;
    cursor: pointer;
  }

  .slider-input::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    background: var(--accent-lime);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 0 6px rgba(200, 255, 87, 0.15);
  }

  .slider-input::-moz-range-thumb {
    width: 22px;
    height: 22px;
    background: var(--accent-lime);
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 0 6px rgba(200, 255, 87, 0.15);
  }

  .slider-scale {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.05em;
  }

  /* Survey footer */
  .survey-footer {
    margin-top: auto;
    display: flex;
    gap: 10px;
    padding-top: 8px;
  }

  .btn {
    flex: 1;
    padding: 16px 24px;
    border-radius: 14px;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary {
    background: var(--surface-1);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--surface-2); color: var(--text); }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent-lime);
    color: var(--bg);
  }

  .btn-primary:hover {
    background: #DAFF7F;
    box-shadow: 0 0 30px rgba(200, 255, 87, 0.4);
  }

  .btn-primary:disabled {
    background: var(--surface-2);
    color: var(--text-faint);
    cursor: not-allowed;
    box-shadow: none;
  }

  /* ======== Loading screen ======== */
  .loading {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    text-align: center;
  }

  .loading-orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-lime), transparent 70%);
    margin-bottom: 32px;
    animation: orb-pulse 1.5s ease-in-out infinite;
  }

  @keyframes orb-pulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  .loading-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent-lime);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .loading-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .loading-step {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 24px;
    min-height: 18px;
  }

  /* ======== Bottom tab bar ======== */
  .tab-bar {
    flex-shrink: 0;
    background: rgba(10, 10, 11, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 10px 0 22px;
    display: flex;
    justify-content: space-around;
  }

  .tab-bar.hidden { display: none; }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--text-faint);
    cursor: pointer;
    padding: 4px 12px;
    transition: color 0.2s;
    background: none;
    border: none;
    font-family: inherit;
  }

  .tab-item.active { color: var(--accent-lime); }
  .tab-item:hover:not(.active) { color: var(--text); }

  .tab-icon {
    width: 22px;
    height: 22px;
    display: grid;
    place-items: center;
  }

  .tab-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ======== Persona-led Dashboard ======== */
  .persona-hero {
    margin: 0 24px 20px;
    padding: 20px;
    background: linear-gradient(135deg, rgba(200, 255, 87, 0.12), rgba(255, 61, 127, 0.08));
    border: 1px solid var(--border-bright);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
  }

  .persona-hero::before {
    content: '';
    position: absolute;
    top: -60px;
    right: -60px;
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(200, 255, 87, 0.25), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .persona-hero::after {
    content: '';
    position: absolute;
    bottom: -40px;
    left: -40px;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(255, 61, 127, 0.2), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .persona-hero-top {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .persona-hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--accent-lime);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .persona-hero-eyebrow::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-lime);
    box-shadow: 0 0 8px var(--accent-lime);
  }

        }, fit: 71 },
    ],

      { headline: '강아지가 주인 알아보는 신호 5가지', hashtag: '#강아지', platform: 'REELS', state: 'RISING',
        reasonByTone: {
          story: '"우리 애도 그래요" 댓글 폭발 포맷.',
          info: '행동학 근거 자막으로 신뢰도 상승.',
          hook: '"이런 행동하면 사랑 표현이래요" 정보형 후킹.'
        }, fit: 90 },
      { headline: '고양이 집사 부르는 방식 BEST', hashtag: '#고양이', platform: 'TIKTOK', state: 'PEAK',
        reasonByTone: {
          story: '집사 vs 고양이 케미 비하인드.',
          info: '울음소리 종류별 의미 정보.',
          hook: '"이 소리 들으면 즉시 가야 함" 경고형 후킹.'

  };

  return (RECO_BY_CATEGORY[category] || RECO_BY_CATEGORY.beauty).map(item => ({
    ...item,
    reason: item.reasonByTone[persona.tone] || item.reasonByTone.story
  }));
}

// ============================================================
// STATE
// ============================================================

let state = {
  currentScreen: 'welcome',
  currentQuestion: 0,
  answers: {},
  persona: null,
  filterPlatform: 'all',
  filterCategory: null,
};

// ============================================================
// SCREEN TRANSITIONS
// ============================================================

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === id) {
      s.classList.add('active');
      s.classList.remove('exit-left');
    } else if (s.classList.contains('active')) {
      s.classList.remove('active');
      s.classList.add('exit-left');
      setTimeout(() => s.classList.remove('exit-left'), 350);
    } else {
      s.classList.remove('active', 'exit-left');
    }
  });
  state.currentScreen = id.replace('screen-', '');
}

function showAppShell() {
  document.getElementById('appHeader').style.display = 'flex';
  document.getElementById('tabBar').classList.remove('hidden');
}

function hideAppShell() {
  document.getElementById('appHeader').style.display = 'none';
  document.getElementById('tabBar').classList.add('hidden');
}

// ============================================================
// SURVEY FLOW
// ============================================================

function startSurvey() {
  state.currentQuestion = 0;
  state.answers = {};
  renderProgressBar();
  renderQuestion();
  showScreen('screen-survey');
}

function renderProgressBar() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  for (let i = 0; i < QUESTIONS.length; i++) {
    const seg = document.createElement('div');
    seg.className = 'progress-segment';
    if (i < state.currentQuestion) seg.classList.add('done');
    else if (i === state.currentQuestion) seg.classList.add('current');
    bar.appendChild(seg);
  }
}

function renderQuestion() {
  const q = QUESTIONS[state.currentQuestion];
  document.getElementById('stepNum').textContent = `QUESTION ${String(state.currentQuestion + 1).padStart(2, '0')} / 07`;
  document.getElementById('questionText').innerHTML = q.title;
  document.getElementById('questionHint').textContent = q.hint;
  renderProgressBar();

  const body = document.getElementById('questionBody');
  body.innerHTML = '';

  if (q.type === 'single' || q.type === 'multi') {
    const grid = document.createElement('div');
    grid.className = 'option-grid';
    const currentVal = state.answers[q.id];

    q.options.forEach(opt => {
      const div = document.createElement('div');
      div.className = `option ${q.type === 'multi' ? 'multi' : ''}`;

      const isSelected = q.type === 'multi'
        ? (currentVal || []).includes(opt.value)
        : currentVal === opt.value;
      if (isSelected) div.classList.add('selected');

      div.innerHTML = `
        <div class="option-emoji">${opt.emoji}</div>
        <div class="option-label">${opt.label}</div>
        <div class="option-check"></div>
      `;

      div.addEventListener('click', () => {
        if (q.type === 'multi') {
          let arr = state.answers[q.id] || [];
          if (arr.includes(opt.value)) {
            arr = arr.filter(v => v !== opt.value);
          } else {
            if (arr.length >= q.max) return;
            arr = [...arr, opt.value];
          }
          state.answers[q.id] = arr;
        } else {
          state.answers[q.id] = opt.value;
        }
        renderQuestion();
        updateNextButton();
      });
      grid.appendChild(div);
    });
    body.appendChild(grid);

  } else if (q.type === 'slider') {
    if (state.answers[q.id] === undefined) state.answers[q.id] = q.default;

    const wrap = document.createElement('div');
    wrap.className = 'slider-wrap';
    const val = state.answers[q.id];
    const labelText = q.labels ? q.labels[val] : (q.suffix || '');

    wrap.innerHTML = `
      <div class="slider-value">${q.suffix ? val : (q.labels ? val : val)}<span style="font-size: 22px; color: var(--text-dim); margin-left: 8px;">${q.suffix || ''}</span></div>
      <div class="slider-value-label">${q.labels ? q.labels[val] : '주당 업로드 목표'}</div>
      <input type="range" class="slider-input" min="${q.min}" max="${q.max}" value="${val}" />
      <div class="slider-scale">
        <span>${q.labels ? q.labels[q.min] : q.min + (q.suffix || '')}</span>
        <span>${q.labels ? q.labels[q.max] : q.max + (q.suffix || '')}</span>
      </div>
    `;
    body.appendChild(wrap);

    const input = wrap.querySelector('.slider-input');
    input.addEventListener('input', e => {
      state.answers[q.id] = parseInt(e.target.value);
      renderQuestion();
      updateNextButton();
    });
  }

  updateNextButton();
  document.getElementById('backBtn').disabled = state.currentQuestion === 0;
}

function updateNextButton() {
  const q = QUESTIONS[state.currentQuestion];
  const val = state.answers[q.id];
  const nextBtn = document.getElementById('nextBtn');
  let valid = false;

  if (q.type === 'single') valid = !!val;
  else if (q.type === 'multi') valid = val && val.length >= 1;
  else if (q.type === 'slider') valid = val !== undefined;

  nextBtn.disabled = !valid;

  // Last question => "분석 시작"
  if (state.currentQuestion === QUESTIONS.length - 1) {
    nextBtn.textContent = '분석 시작 →';
  } else {
    nextBtn.textContent = 'NEXT →';
  }
}

function nextQuestion() {
  if (state.currentQuestion < QUESTIONS.length - 1) {
    state.currentQuestion++;
    renderQuestion();
  } else {
    runAnalysis();
  }
}

function prevQuestion() {
  if (state.currentQuestion > 0) {
    state.currentQuestion--;
    renderQuestion();
  }
}

// ============================================================
// LOADING + ANALYSIS
// ============================================================

function runAnalysis() {
  showScreen('screen-loading');

  const steps = [
    '설문 응답 분석 중',
    '페르소나 매핑 중',
    '트렌드 데이터 매칭 중',
    '개인화 추천 생성 중',
  ];

  let i = 0;
  const stepEl = document.getElementById('loadingStep');
  stepEl.textContent = steps[0];

  const interval = setInterval(() => {
    i++;
    if (i < steps.length) {
      stepEl.textContent = steps[i];
    } else {
      clearInterval(interval);
      finishAnalysis();
    }
  }, 700);
}

function finishAnalysis() {
  state.persona = determinePersona(state.answers);
  state.filterCategory = state.answers.category;
  showAppShell();
  renderDashboard();
  switchTab('dashboard');
}

// ============================================================
// DASHBOARD
// ============================================================

function renderDashboard() {
  const c = document.getElementById('dashboardContent');
  const userCategory = state.answers.category || 'beauty';
  const trends = TRENDS_BY_CATEGORY[state.filterCategory || userCategory] || TRENDS_BY_CATEGORY[userCategory];

  // Filter by platform if selected
  const filteredTrends = state.filterPlatform === 'all'
    ? trends
    : trends.filter(t => t.platform === state.filterPlatform);

  const totalViews = filteredTrends.reduce((sum, t) => {
    const v = parseFloat(t.views.replace('M', '').replace('K', ''));
    return sum + (t.views.includes('M') ? v : v / 1000);
  }, 0);

  // Get user context for chips
  const platformLabel = PLATFORM_LABELS[state.answers.platform] || '멀티';
  const categoryLabel = CATEGORY_LABELS[userCategory] || '뷰티';
  const expLabels = QUESTIONS.find(q => q.id === 'experience').labels;
  const expLabel = expLabels[state.answers.experience] || '';

  c.innerHTML = `
    <!-- PERSONA HERO — 사용자에게 "이건 너를 위한 화면이야"를 명확히 -->
    <div class="persona-hero">
      <div class="persona-hero-top">
        <div class="persona-hero-eyebrow">YOUR PERSONA</div>
        <div class="persona-hero-greeting">06 MAY · LIVE</div>
      </div>
      <div class="persona-hero-name">${state.persona.type}</div>
      <div class="persona-hero-tagline">${state.persona.tagline}</div>

      <div class="persona-hero-divider"></div>

      <div class="persona-hero-context">
        <span class="context-chip">
          <span class="context-chip-key">CATEGORY</span>
          <span class="context-chip-val">${categoryLabel}</span>
        </span>
        <span class="context-chip">
          <span class="context-chip-key">PLATFORM</span>
          <span class="context-chip-val">${platformLabel}</span>
        </span>
        ${expLabel ? `<span class="context-chip">
          <span class="context-chip-key">CAREER</span>
          <span class="context-chip-val">${expLabel}</span>
        </span>` : ''}
      </div>
    </div>

    <!-- FEED INTRO — 페르소나 → 피드로 연결 -->
    <div class="feed-intro">
      <div class="feed-intro-text">
        <div class="feed-intro-eyebrow">CURATED FOR YOU</div>
        <div class="feed-intro-title"><span class="accent">${state.persona.type.replace('THE ', '')}</span>를<br/>위한 오늘의 트렌드</div>
      </div>
      <div class="feed-intro-meta">${filteredTrends.length} 건</div>
    </div>

    <div class="filter-row">
      ${renderPlatformPill('all', '🔥', '전체')}
      ${renderPlatformPill('youtube', '▶', 'YouTube Shorts')}
      ${renderPlatformPill('tiktok', '♪', 'TikTok')}
      ${renderPlatformPill('instagram', '◎', 'Reels')}
    </div>

    <div class="chip-row">
      ${Object.keys(TRENDS_BY_CATEGORY).map(cat => `
        <button class="chip ${state.filterCategory === cat ? 'active' : ''}" onclick="setFilterCategory('${cat}')">${CATEGORY_LABELS[cat]}</button>
      `).join('')}
    </div>

    <div class="stats-strip">
      <div class="stat">
        <div class="stat-label">총 조회수</div>
        <div class="stat-value lime">${totalViews.toFixed(1)}M</div>
      </div>
      <div class="stat">
        <div class="stat-label">평균 성장률</div>
        <div class="stat-value pink">${calcAvgGrowth(filteredTrends)}%</div>
      </div>
      <div class="stat">
        <div class="stat-label">신규 트렌드</div>
        <div class="stat-value">${filteredTrends.length * 11}</div>
      </div>
    </div>

    <div class="section-heading">
      <div class="section-title">RISING NOW</div>
      <div class="section-subtitle">최근 24시간</div>
    </div>

    <div class="trend-list">
      ${filteredTrends.length === 0 ? `
        <div class="empty-message">
          <div class="empty-message-emoji">🔍</div>
          <div class="empty-message-text">선택한 필터에 맞는<br/>트렌드가 없어요</div>
        </div>
      ` : filteredTrends.map(t => renderTrendCard(t)).join('')}
    </div>
  `;

  // Re-attach platform pill handlers (innerHTML wipes them)
  document.querySelectorAll('#dashboardContent .platform-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      state.filterPlatform = pill.dataset.platform;
      renderDashboard();
    });
  });
}

function renderPlatformPill(platform, emoji, label) {
  const active = state.filterPlatform === platform ? 'active' : '';
  return `<button class="platform-pill ${active}" data-platform="${platform}"><span class="pill-emoji">${emoji}</span>${label}</button>`;
}

function setFilterCategory(cat) {
  state.filterCategory = state.filterCategory === cat ? null : cat;
  renderDashboard();
}

function calcAvgGrowth(trends) {
  if (trends.length === 0) return '0';
  const total = trends.reduce((sum, t) => {
    const match = t.growth.match(/(\d+)/);
    return sum + (match ? parseInt(match[1]) : 0);
  }, 0);
  return Math.round(total / trends.length);
}

function renderTrendCard(t) {
  const fadeClass = t.growth.includes('↓') ? 'fade' : '';
  return `
    <div class="trend-card">
      <div class="trend-rank ${t.lifecycle === 'peak' ? 'peak' : t.lifecycle === 'fading' ? 'fading' : ''}">#${t.rank}</div>
      <div class="trend-meta">
        <span class="platform-badge ${t.platform}">${t.platformLabel}</span>
        <span class="trend-time">${t.time}</span>
      </div>
      <div class="trend-body">
        <div class="trend-thumb">${t.thumb}</div>
        <div class="trend-info">
          <div class="trend-title">${t.title}</div>
          <div class="trend-creator">${t.creator}</div>
          <div class="trend-stats">
            <div>👁 ${t.views}</div>
            <div>♥ ${t.likes}</div>
            <div>↗ ${t.shares}</div>
          </div>
        </div>
      </div>
      <div class="trend-growth">
        <span class="hashtags">${t.hashtags}</span>
        <span class="growth-tag ${fadeClass}">${t.growth}</span>
      </div>
    </div>
  `;
}

function resetApp() {
  if (!confirm('정말 처음부터 다시 시작하시겠어요?')) return;
  state = {
    currentScreen: 'welcome',
    currentQuestion: 0,
    answers: {},
    persona: null,
    filterPlatform: 'all',
    filterCategory: null,
  };
  hideAppShell();
  showScreen('screen-welcome');
}

// ============================================================
// TAB SWITCHING
// ============================================================

function switchTab(tab) {
  document.querySelectorAll('.tab-item').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });

  if (tab === 'dashboard') {
    renderDashboard();
    showScreen('screen-dashboard');
    document.getElementById('headerRight').textContent = 'LIVE';
  } else if (tab === 'reco') {
    renderReco();
    showScreen('screen-reco');
    document.getElementById('headerRight').textContent = 'FOR YOU';
  } else if (tab === 'profile') {
    renderProfile();
    showScreen('screen-profile');
    document.getElementById('headerRight').textContent = 'PROFILE';
  }
}
